name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check agent/

      - name: Syntax-check install.sh
        run: bash -n scripts/install.sh

      - name: Verify CLI entry points
        run: |
          python -m agent --help
          python -m agent configure --help
          python -m agent setup-vault --help
          python -m agent seed-templates --help
          python -m agent process-inbox --help

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -m "not integration" \
            -v \
            --tb=short \
            --cov=agent \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
